<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claims Adjudication Agent — MedGuard AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#1B4F72"/>
        <path d="M14 6v16M6 14h16" stroke="#A8C8E8" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="14" cy="14" r="4" stroke="#5BA4CF" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <div class="logo-text"><span class="logo-name">MedGuard</span><span class="logo-sub">AI Platform</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Agents</div>
    <a href="../index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity=".4"/><rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity=".4"/></svg>Dashboard</a>
    <a href="medical-coding.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 20 20"><path d="M4 3h12a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>Medical Coding</a>
    <a href="prior-auth.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 20 20"><path d="M10 2l2.5 5 5.5.8-4 3.9.9 5.5L10 14.7l-4.9 2.5.9-5.5-4-3.9 5.5-.8z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>Prior Authorization</a>
    <a href="claims.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 7v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Claims Adjudication</a>
    <a href="device-form.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 20 20"><rect x="6" y="2" width="8" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>Device Implant Form</a>
    <div class="nav-section-label" style="margin-top:16px">Compliance</div>
    <a href="audit.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 20 20"><path d="M3 6h14M3 10h10M3 14h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Audit Trail</a>
  </nav>
  <div class="sidebar-footer"><div class="compliance-badge"><span class="badge-dot"></span>HIPAA Compliant</div></div>
</aside>

<main class="main">
  <header class="topbar">
    <div class="topbar-left"><h1 class="page-title">Claims Adjudication Agent</h1></div>
    <div class="topbar-right"><button class="btn btn-secondary btn-sm" onclick="loadSample()">Load Sample Claim</button></div>
  </header>

  <div class="page-content">
    <div class="agent-page">

      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Claim Submission</div><div class="card-subtitle">Enter claim details for adjudication</div></div>
        </div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Member ID</label>
              <input class="form-input" id="member-id" placeholder="MBR-XXXXXXXX">
            </div>
            <div class="form-group">
              <label class="form-label">Provider NPI</label>
              <input class="form-input" id="provider-npi" placeholder="10-digit NPI">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Procedure Code (CPT)</label>
              <input class="form-input" id="procedure-code" placeholder="e.g. 27447">
            </div>
            <div class="form-group">
              <label class="form-label">Modifier</label>
              <input class="form-input" id="modifier" placeholder="e.g. RT, LT, 26">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Diagnosis Code (ICD-10)</label>
              <input class="form-input" id="diagnosis-code" placeholder="e.g. M17.11">
            </div>
            <div class="form-group">
              <label class="form-label">Place of Service</label>
              <select class="form-select" id="pos">
                <option value="21">21 - Inpatient Hospital</option>
                <option value="22">22 - On Campus Outpatient</option>
                <option value="11">11 - Office</option>
                <option value="23">23 - Emergency Room</option>
                <option value="24">24 - Ambulatory Surgical Center</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Billed Amount ($)</label>
              <input class="form-input" id="billed-amount" type="number" placeholder="0.00">
            </div>
            <div class="form-group">
              <label class="form-label">Service Date</label>
              <input class="form-input" id="service-date" type="date">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Authorization Number (if applicable)</label>
            <input class="form-input" id="auth-number" placeholder="AUTH-XXXXXXXX">
          </div>
          <button class="btn btn-primary" id="run-btn" onclick="runAgent()" style="width:100%">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M8 7l6 3-6 3V7z" fill="currentColor"/></svg>
            Adjudicate Claim
          </button>
        </div>
      </div>

      <div id="results-col">
        <div class="result-panel">
          <div class="result-empty">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <p>Submit a claim to receive<br>an adjudication decision</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="../js/api.js"></script>
<script>
async function loadSample() {
  const data = await apiGet('/claims/sample');
  document.getElementById('member-id').value = data.member_id || '';
  document.getElementById('provider-npi').value = data.provider_npi || '';
  document.getElementById('procedure-code').value = data.procedure_code || '';
  document.getElementById('modifier').value = data.modifier || '';
  document.getElementById('diagnosis-code').value = data.diagnosis_code || '';
  document.getElementById('billed-amount').value = data.billed_amount || '';
  document.getElementById('service-date').value = data.service_date || '';
  document.getElementById('auth-number').value = data.authorization_number || '';
}

async function runAgent() {
  const procCode = document.getElementById('procedure-code').value.trim();
  if (!procCode) { alert('Please enter a procedure code.'); return; }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  showLoading('results-col', 'Processing claim through adjudication engine...');

  try {
    const result = await apiPost('/claims/adjudicate', {
      member_id: document.getElementById('member-id').value,
      provider_npi: document.getElementById('provider-npi').value,
      procedure_code: procCode,
      modifier: document.getElementById('modifier').value,
      diagnosis_code: document.getElementById('diagnosis-code').value,
      place_of_service: document.getElementById('pos').value,
      billed_amount: parseFloat(document.getElementById('billed-amount').value) || 0,
      service_date: document.getElementById('service-date').value,
      authorization_number: document.getElementById('auth-number').value
    });
    renderResults(result);
  } catch(e) {
    showError('results-col', 'Agent error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

function fmt(n) { return n != null ? '$' + parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2}) : '—'; }

function renderResults(r) {
  const col = document.getElementById('results-col');
  const cls = decisionClass(r.adjudication_decision);

  const adjustmentsHtml = (r.adjustment_reasons || []).map(a => `
    <div class="kv-row">
      <span class="kv-key">${escapeHtml(a.reason || a.code)}</span>
      <span class="kv-value" style="color:var(--red)">(${fmt(a.amount)})</span>
    </div>`
  ).join('');

  const fraudHtml = (r.fraud_indicators || []).map(f =>
    `<div class="flag-item error"><div class="flag-dot"></div>${escapeHtml(f)}</div>`
  ).join('');

  const ncciHtml = (r.ncci_edits_applied || []).map(n =>
    `<div class="flag-item info"><div class="flag-dot"></div>${escapeHtml(n)}</div>`
  ).join('');

  const denialHtml = (r.denial_codes || []).map(d =>
    `<div class="flag-item error"><div class="flag-dot"></div><strong>${escapeHtml(d.code)}</strong> — ${escapeHtml(d.description)}</div>`
  ).join('');

  col.innerHTML = `
    <div class="result-panel">
      <div class="decision-banner ${cls}">
        <div class="decision-icon">${decisionIcon(cls)}</div>
        <div class="decision-text">
          <div class="decision-label">${escapeHtml(r.adjudication_decision || 'Processing')}</div>
          <div class="decision-value">Claim ${escapeHtml(r.claim_number || '')}</div>
        </div>
      </div>

      <div class="section-divider">Payment Summary</div>
      <div class="kv-list">
        <div class="kv-row"><span class="kv-key">Billed Amount</span><span class="kv-value">${fmt(r.allowed_amount != null ? (r.allowed_amount + (r.adjustment_reasons||[]).reduce((s,a)=>s+(a.amount||0),0)) : null)}</span></div>
        <div class="kv-row"><span class="kv-key">Allowed Amount</span><span class="kv-value">${fmt(r.allowed_amount)}</span></div>
        ${adjustmentsHtml}
        <div class="kv-row"><span class="kv-key">Plan Payment</span><span class="kv-value" style="color:var(--green);font-weight:700">${fmt(r.plan_payment)}</span></div>
        <div class="kv-row"><span class="kv-key">Patient Responsibility</span><span class="kv-value">${fmt(r.patient_responsibility)}</span></div>
        <div class="kv-row"><span class="kv-key">Methodology</span><span class="kv-value">${escapeHtml(r.payment_methodology || '—')}</span></div>
      </div>

      ${denialHtml ? `<div class="section-divider">Denial Codes</div><div class="flags-list">${denialHtml}</div>` : ''}
      ${fraudHtml ? `<div class="section-divider">Fraud Indicators</div><div class="flags-list">${fraudHtml}</div>` : ''}
      ${ncciHtml ? `<div class="section-divider">NCCI Edits Applied</div><div class="flags-list">${ncciHtml}</div>` : ''}

      <div id="flags-container"></div>
      <div id="confidence-container"></div>
      <div class="section-divider">Audit</div>
      <div id="audit-container"></div>
    </div>`;

  renderFlags(r.compliance_flags, document.getElementById('flags-container'));
  renderConfidence(r.confidence_score, document.getElementById('confidence-container'));
  renderAuditInfo(r, document.getElementById('audit-container'));
}
</script>
</body>
</html>
